<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e17;
            color: #c8d6e5;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 20px;
            border-bottom: 1px solid #2d3748;
        }
        h1 { font-size: 1.5rem; color: #f7fafc; }
        .price-display {
            font-size: 2rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }
        .price-up { color: #22c55e; }
        .price-down { color: #ef4444; }
        .status {
            font-size: 0.85rem;
            padding: 4px 10px;
            border-radius: 4px;
        }
        .status-running { background: #22543d; color: #68d391; }
        .status-stopped { background: #742a2a; color: #fc8181; }
        .controls {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
            align-items: center;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-start { background: #22c55e; color: #1a202c; }
        .btn-start:hover:not(:disabled) { background: #16a34a; }
        .btn-stop { background: #ef4444; color: white; }
        .btn-stop:hover:not(:disabled) { background: #dc2626; }
        .btn-buy { background: #3b82f6; color: white; }
        .btn-buy:hover:not(:disabled) { background: #2563eb; }
        .btn-sell { background: #f97316; color: white; }
        .btn-sell:hover:not(:disabled) { background: #ea580c; }
        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }
        .speed-label {
            font-size: 0.85rem;
            color: #718096;
        }
        .speed-input {
            width: 70px;
            padding: 8px 10px;
            border: 1px solid #4a5568;
            border-radius: 6px;
            background: #1a202c;
            color: #f7fafc;
            font-size: 0.95rem;
            font-family: 'Courier New', monospace;
            text-align: center;
        }
        .speed-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }
        .speed-unit {
            font-size: 0.8rem;
            color: #4a5568;
        }
        .chart-container {
            background: #0d1117;
            border: 1px solid #1a2332;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
        }
        #priceChart {
            width: 100%;
            height: 400px;
            display: block;
        }
        #orderBookChart {
            width: 100%;
            height: 200px;
            display: block;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .stat-card {
            background: #1a202c;
            padding: 15px;
            border-radius: 8px;
        }
        .stat-label { font-size: 0.8rem; color: #718096; }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: #f7fafc; margin-top: 5px; }
        .section-title {
            font-size: 1rem;
            color: #a0aec0;
            margin: 15px 0 10px;
        }
        .candle-legend {
            font-size: 0.8rem;
            color: #4a5568;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Market Simulator</h1>
                <span id="status" class="status status-stopped">Connecting...</span>
            </div>
            <div id="priceDisplay" class="price-display">---</div>
        </header>

        <div class="controls">
            <button id="btnStart" class="btn-start" onclick="controlSim('start')">Start</button>
            <button id="btnStop" class="btn-stop" onclick="controlSim('stop')">Pause</button>
            <button id="btnBuy" class="btn-buy" onclick="manualTrade('buy')">Buy 10</button>
            <button id="btnSell" class="btn-sell" onclick="manualTrade('sell')">Sell 10</button>
            <div class="speed-control">
                <span class="speed-label">Speed:</span>
                <input type="number" id="speedInput" class="speed-input" min="1" max="1000" value="10">
                <span class="speed-unit">prices/s</span>
                <button onclick="changeSpeed()" style="background:#4a5568;color:#f7fafc;padding:8px 12px;">Set</button>
            </div>
        </div>

        <div class="section-title">Candlestick Chart</div>
        <div class="candle-legend">Each candle = 60 raw price ticks &nbsp;|&nbsp; Green = close ≥ open &nbsp;|&nbsp; Red = close &lt; open</div>
        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>

        <div class="section-title">Order Book Depth</div>
        <div class="chart-container">
            <canvas id="orderBookChart"></canvas>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Step</div>
                <div id="statStep" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Volume (last tick)</div>
                <div id="statVolume" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Candles</div>
                <div id="statPoints" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Raw Ticks (current)</div>
                <div id="statRawTicks" class="stat-value">0</div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
